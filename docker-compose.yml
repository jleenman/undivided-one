services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '${APP_PORT:-3001}:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
      - next:/home/node/app/.next
      - media:/home/node/app/public/media
    working_dir: /home/node/app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/undivided_one
      DEV_ADMIN_EMAIL: dev@undivided.local
      DEV_ADMIN_NAME: Dev Admin
      DEV_ADMIN_PASSWORD: devpassword
      NEXT_PUBLIC_SERVER_URL: http://localhost:${APP_PORT:-3001}
      WATCHPACK_POLLING: 'true'

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: undivided_one
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d undivided_one']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  node_modules:
  next:
  media:
  postgres_data:
